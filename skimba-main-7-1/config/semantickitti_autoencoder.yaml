# Config format schema number
format_version: 4

###################
## Model options
model_params:
  model_architecture: "cylinder_asym"

  output_shape:
    - 256
    - 256
    - 32

  fea_dim: 3
  out_fea_dim: 3 #128
  num_class: 20
  semantic_embed_dim: 8
  num_input_features: 3 #32
  use_norm: True
  init_size: 8 #32
  in_channels: 8
  out_channels: 8
  autoencoder_num_res_blocks: 1
  autoencoder_channels_list:
    - 16
    - 32
    - 64
    - 128
  auto_groups: 4
  channels_list:
    - 32
    - 64
    - 128
  latent_channels: 64
  condition_in_channels: 88
  image_condition_channels: 64
  partial_condition_channels: 24
  condition_mid_channels: 44
  condition_channels: 16
  condition_dropout_prob: 0.1
  guidance_scale: 3.0
  num_inference_steps: 100
  voxel_channel: 1

  num_res_blocks: 2
  n_heads: 2
  attention_resolutions:
    - 2
    - 4
    - 8
  dropout: 0
  n_layers: 1
  groups: 32
  dropout_rate: 0.2
  latent_normalization:
    enabled: True
    stats_path: "/mnt/data/projects/skimba-main-7-1/latent_channel_stats.json"
    min_std: 1e-6


###################
## Dataset options
dataset_params:
  dataset_type: "voxel_dataset"
  pc_dataset_type: "SemKITTI_sk_multiscan"
  ignore_label: 255
  return_test: True
  fixed_volume_space: True
  label_mapping: "config/label_mapping/semantic-kitti-multiscan.yaml"
  data_root: "/mnt/data/datasets/kitti/odometry/skimba_data"
  kitti_root: "/mnt/data/datasets/kitti/odometry/skimba_data"
  vae_feature_root: "VAE_Encoder_Features_Semantic20_epoch210"
  image_condition_root: "Image_transform_Voxel_Condition_Features"
  partial_condition_root: "Mask2Former_Partial_Condition_Features"
  gt_root: "data_odometry_voxels_all"
  invalid_root: "data_odometry_voxels_all"

  max_volume_space:
    - 51.2
    - 25.6
    - 4.4
  min_volume_space:
    - 0
    - -25.6
    - -2


###################
## Data_loader options
train_data_loader:
  imageset:  "train"  #"train"
  return_ref: True
  batch_size: 12 # per GPU; global batch size is 24 with two GPUs
  shuffle: True
  num_workers: 8 # per process; 16 workers total with two processes

val_data_loader:
  imageset: "val"
#  imageset: "test"
  return_ref: True
  batch_size: 1 #2
  shuffle: False
  num_workers: 4
  frame_divisor: 10


###################
## Train params
train_params:
  model_load_path: "/mnt/data/datasets/kitti/odometry/skimba_data/model_save_path/Train_raw64_mask2former24_1x1/"
  model_save_path: "/mnt/data/datasets/kitti/odometry/skimba_data/model_save_path/Train_raw64_mask2former24_1x1/"
  resume_checkpoint: ""
  validation_output_path: ""
  checkpoint_every_n_steps: 4783
  max_num_epochs: 1500
  eval_every_n_steps: 4783 #2000
  eval_every_n_epochs: 10
  eval_first_phase_epochs: 450
  eval_first_phase_every_n_epochs: 30
  eval_after_phase_every_n_epochs: 10
  learning_rate: 1e-4 # target LR after linear warmup; constant thereafter
  warmup_start_lr: 1e-6
  warmup_epochs: 15
  early_stopping_patience: 15
  vae_checkpoint: "/mnt/data/datasets/kitti/odometry/skimba_data/model_save_path/vae_v2/best_210_99.12439993681576.pth"
  freeze_autoencoder: True
  strict_vae_load: True
