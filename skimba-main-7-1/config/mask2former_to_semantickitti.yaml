# Source indices are Cityscapes semantic train ids produced by the chosen Mask2Former checkpoint.
# Target ids are SemanticKITTI learning labels used by config/label_mapping/semantic-kitti-multiscan.yaml.
# Unmapped source classes are accumulated into target 0.
model_to_semantickitti:
  0: 9    # road
  1: 11   # sidewalk
  2: 13   # building
  3: 0    # wall
  4: 14   # fence
  5: 18   # pole
  6: 19   # traffic light -> traffic-sign
  7: 19   # traffic sign
  8: 15   # vegetation
  9: 17   # terrain
  10: 0   # sky
  11: 6   # person
  12: 7   # rider -> bicyclist fallback
  13: 1   # car
  14: 4   # truck
  15: 5   # bus -> other-vehicle
  16: 5   # train -> other-vehicle
  17: 3   # motorcycle
  18: 2   # bicycle
